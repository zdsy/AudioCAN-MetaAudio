base:
  n_way: 5
  k_shot: 1 
  q_queries: 1
  cuda: 0
  num_repeats: 1
  task_type: 'MAML_BirdClef_'

models: ['resnet']

hyper:
  inner_train_steps: 8
  inner_val_steps: 8

  inner_lr: 0.2 # 0.4
  meta_lr: 0.001
  min_lr: 0.001
  T_max: 1


training:
  epochs: 500
  episodes_per_epoch: 10
  train_batch_size: 50 # 50

  # How many tasks we want at each step
  val_tasks: 200
  test_tasks: 1000

  trans_batch: False

  # Episodes between validation steps
  eval_spacing: 10
  # How long to tolerate exactly radnom performance for, probs broken
  break_threshold: 500
  warm_up: 100000
  num_workers: 4


data:
  variable: True
  name: 'BirdClef' 
  norm: 'global'
  type: 'variable_spec' # rawtospec/spec/variable_spec
  fixed: True

  # fixed_path: 'dataset_/splits/BirdClef_norm_split_PRUNED.npy'
  # data_path: '../../Datasets/BirdClef/features'
  fixed_path: '/home/ids/xzhuang/audio-few-shot-learning/data/BirdClef/splits.npy'
  data_path: '/home/ids/xzhuang/audio-few-shot-learning/data/BirdClef/features'

split:
  train: 0.7
  val: 0.1
  test: 0.2
